name: Main Foodgram workflow

on:
  push:
    branches:
      - main

jobs:
  # frontend_tests:
  #   runs-on: ubuntu-22.04
  #   steps:
  #   - uses: actions/checkout@v4
  #   - name: Set up nodeJS
  #     uses: actions/setup-node@v4
  #     with:
  #       node-version: 16
  #   - name: Install dependencies
  #     run: |
  #       cd frontend/
  #       npm ci
  #   - name: Test frontend
  #     run: |
  #       cd frontend/
  #       npm run test

  backend_tests:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:14.11
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_password
          POSTGRES_DB: django_db
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Check out repo code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.0.0
          pip install -r ./backend/requirements.txt
      - name: Test with flake8 and other django tests
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_db
          POSTGRES_DB: django_db
          # The DB server been started under Docker, with its port piped to
          # the host, => we're connecting to 127.0.0.1:5432
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          python -m flake8 backend/
          cd backend/
          pytest

  build_and_push_backend_to_docker_hub:
    name: Build & push FG backend Docker img to DockerHub
    runs-on: ubuntu-22.04
    # needs: [backend_tests, frontend_tests]
    needs: backend_tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest

  build_and_push_frontend_to_docker_hub:
    name: Build & push FG frontend Docker img to DockerHub
    runs-on: ubuntu-22.04
    # needs: frontend_tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest

  deploy:
    runs-on: ubuntu-22.04
    needs:
      - build_and_push_backend_to_docker_hub
      - build_and_push_frontend_to_docker_hub
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4

    # Forcefully remove the entire foodgram directory to ensure a clean slate
    # Then recreate it. This ensures no lingering directory issues from previous failed copies.
    - name: Prepare remote foodgram directory (aggressive cleanup)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        script: |
          set -x # Enable shell debugging for this step
          rm -rf foodgram
          mkdir -p foodgram
          ls -ld foodgram
          ls -l foodgram

    # NEW: Robust SSH key setup using ssh-agent for rsync
    - name: Set up SSH and Copy critical config files via rsync
      run: |
        set -x # Enable shell debugging
        # Start ssh-agent if not already running
        if [ -z "$SSH_AUTH_SOCK" ]; then
          eval "$(ssh-agent -s)"
        fi
        # Add the SSH private key to the agent
        # The 'printf' command is more robust for multi-line strings than 'echo'
        # Provide the passphrase via stdin if SSH_PASSPHRASE is set
        if [ -n "${{ secrets.SSH_PASSPHRASE }}" ]; then
          printf "%s\n" "${{ secrets.SSH_KEY }}" | ssh-add - -p "${{ secrets.SSH_PASSPHRASE }}"
        else
          printf "%s\n" "${{ secrets.SSH_KEY }}" | ssh-add -
        fi

        # Add server's host key to known_hosts to prevent interactive prompts
        # This scans your target host, not GitHub.com
        ssh-keyscan ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        chmod 600 ~/.ssh/known_hosts # Ensure correct permissions for known_hosts

        # Verify key is added
        ssh-add -l

        # Copy docker-compose.production.yaml
        rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
              ./infra/docker-compose.production.yaml \
              ${{ secrets.USER }}@${{ secrets.HOST }}:~/foodgram/

        # Copy nginx.conf
        rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
              ./infra/nginx.conf \
              ${{ secrets.USER }}@${{ secrets.HOST }}:~/foodgram/
        
        # Copy .env file (assuming it's at the root of your repo)
        rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
              ./.env \
              ${{ secrets.USER }}@${{ secrets.HOST }}:~/foodgram/
      env:
        # The SSH_KEY secret is directly used by printf and ssh-add, not as a file.
        # SSH_AUTH_SOCK is set by eval "$(ssh-agent -s)" and is crucial for rsync/ssh.
        SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }} # Ensure agent socket is available
        SSH_AGENT_PID: ${{ env.SSH_AGENT_PID }} # Ensure agent PID is available
        # SSH_ASKPASS is sometimes used, but piping directly is often more reliable for non-interactive scripts.
        # However, for ssh-add with passphrase, it's better to explicitly provide it if possible.
        # The above if/else block directly handles passing the passphrase to ssh-add.


    # Original scp for docs folder (if it's working)
    - name: Copy doc folder via ssh
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        source: "./docs"
        target: "foodgram" # This is correct for copying a directory INTO foodgram

    - name: Execute remote ssh commands to deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        script: |
          set -x # Enable shell debugging
          cd foodgram
          # VERIFY nginx.conf, docker-compose.production.yaml, and .env types AFTER copying
          ls -ld nginx.conf docker-compose.production.yaml .env
          # Files are now directly in foodgram/ from rsync/scp, no internal 'cp' needed.
          docker compose -f docker-compose.production.yaml --progress=quiet pull
          docker compose -f docker-compose.production.yaml --progress=quiet down -v
          docker compose -f docker-compose.production.yaml --progress=quiet up -d
          # Additional commands, if any, that rely on services being up
          docker compose -f docker-compose.production.yaml exec backend python manage.py migrate
          docker compose -f docker-compose.production.yaml exec backend python manage.py collectstatic --noinput # Added --noinput for non-interactive
          docker compose -f docker-compose.production.yaml exec backend python manage.py loaddata db.json
          docker compose -f docker-compose.production.yaml exec backend python manage.py import_csv eng
          echo "Deployment commands executed on remote server."

  send_telegram:
    runs-on: ubuntu-22.04
    needs: deploy
    steps:
    - name: Send a telegram to mark the end of the deployment
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: Foodgram been refreshed in builds & deployed OK to WebSpace.
